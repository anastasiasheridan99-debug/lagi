const SIZE_CHART=[
  {size:'XS', bust:[32,34], waist:[24,25], hips:[33,35]},
  {size:'S',  bust:[35,36], waist:[26,27], hips:[35,37]},
  {size:'M',  bust:[37,38], waist:[28,30], hips:[37,39]},
  {size:'L',  bust:[39,41], waist:[30,32], hips:[39,41]},
  {size:'XL', bust:[42,44], waist:[33,35], hips:[42,44]},
  {size:'2XL',bust:[45,47], waist:[36,38], hips:[45,47]},
  {size:'3XL',bust:[48,51], waist:[39,42], hips:[48,51]},
];
function getSizeFromMeasurements(bust,waist,hips){
  const b=parseFloat(bust),w=parseFloat(waist),h=parseFloat(hips);
  if(isNaN(b)&&isNaN(w)&&isNaN(h))return null;
  let best=null,bestScore=Infinity;
  for(const s of SIZE_CHART){
    let score=0,count=0;
    if(!isNaN(b)){const mid=(s.bust[0]+s.bust[1])/2;score+=Math.abs(b-mid);count++;}
    if(!isNaN(w)){const mid=(s.waist[0]+s.waist[1])/2;score+=Math.abs(w-mid);count++;}
    if(!isNaN(h)){const mid=(s.hips[0]+s.hips[1])/2;score+=Math.abs(h-mid);count++;}
    if(count>0&&score/count<bestScore){bestScore=score/count;best=s.size;}
  }
  return best;
}

    <div className="friends-header"><div className="page-title">Community</div><div style={{display:'flex',gap:8,marginTop:12}}>{['friends','browse'].map(v=><div key={v} className={`filter-chip ${view===v?'filter-active':'filter-inactive'}`} style={{fontSize:13}} onClick={()=>setView(v)}>{v==='friends'?'Friends':'Browse Available'}</div>)}</div></div>
    {view==='friends'?<div><div style={{padding:'0 20px',fontSize:13,color:'#b8a898',marginBottom:8}}>Friends get first access to your pieces</div><div className="friend-list">{FRIENDS.map(f=><div className="friend-item" key={f.id}><div className="friend-avatar">{f.initials}{f.items>0&&<div className="friend-badge">{f.items}</div>}</div><div><div className="friend-name">{f.name}</div><div className="friend-sub">{f.aesthetic} · {f.items} available</div></div><div className="friend-arrow">›</div></div>)}</div><div style={{padding:'16px 20px'}}><button className="btn-outline" style={{width:'100%'}}>Invite a Friend</button></div></div>
    :<div><div className="browse-title">Available Now ✦</div><div className="community-cards">{COMMUNITY_ITEMS.map(item=><div className="community-card" key={item.id} onClick={()=>setSelectedItem({...item,fromFriend:true})}><div className="cc-img" style={{background:item.bg}}>{item.emoji}</div><div className="cc-owner"><div className="cc-avatar">{item.owner}</div><span className="cc-name">{item.ownerName}</span></div><div className="cc-item">{item.item}</div><div style={{padding:'0 10px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:11,color:'#b8a898'}}>{item.brand}</span><StatusPill status={item.status}/></div></div>)}</div><div style={{padding:'12px 20px 0'}}><div className="section-title">Exchange Activity</div></div><div className="exchange-list" style={{paddingBottom:20}}>{EXCHANGES.slice(0,2).map(ex=><div className="exchange-card" key={ex.id}><div className="ex-header"><div className="ex-emoji">{ex.emoji}</div><div className="ex-info"><div className="ex-title">{ex.item}</div><div className="ex-sub">{ex.from} · {ex.type}</div></div></div><div className="ex-status"><span className={`status-tag ${exStatusMap[ex.status].class}`}>{exStatusMap[ex.status].label}</span><span className="ex-date">{ex.date}</span></div></div>)}</div></div>}
  </div>;
}
function ProfileScreen(){
  const badges=[{icon:'🌱',name:'First Give',desc:'Passed on your first piece'},{icon:'✦',name:'Style Pioneer',desc:'Created 10+ outfits'},{icon:'💛',name:'Generous Heart',desc:'Helped 5 pieces find a new home'}];
  return <div className="screen">
    <div className="profile-header"><div className="profile-top"><div className="profile-avatar">A</div><div><div className="profile-name">Ana</div><div className="profile-handle">@anafashion · Singapore</div><div className="profile-bio">Finance by day, style by night. Slow fashion advocate.</div></div></div><div className="profile-stats"><div className="pstat"><div className="pstat-num">24</div><div className="pstat-label">Pieces</div></div><div className="pstat"><div className="pstat-num">8</div><div className="pstat-label">Shared</div></div><div className="pstat"><div className="pstat-num">5</div><div className="pstat-label">Re-loved</div></div><div className="pstat"><div className="pstat-num">12</div><div className="pstat-label">Outfits</div></div></div></div>
    <div className="profile-body"><div style={{marginBottom:20}}><div className="section-title" style={{padding:0,marginBottom:12}}>My Aesthetics</div><div className="aesthetics-row">{['Minimal','Feminine','Coastal','Workwear'].map(a=><div key={a} className="aesthetic-tag">{a}</div>)}</div></div><div style={{marginBottom:20}}><div className="section-title" style={{padding:0,marginBottom:12}}>Achievements</div><div className="badges-grid">{badges.map(b=><div className="badge-item" key={b.name}><div className="badge-icon">{b.icon}</div><div><div className="badge-name">{b.name}</div><div className="badge-desc">{b.desc}</div></div></div>)}</div></div><div><div className="section-title" style={{padding:0,marginBottom:12}}>Style Mood</div><div style={{background:'#faf7f3',borderRadius:16,padding:16,border:'1px solid #ede5d8'}}><div style={{fontSize:16,color:'#6a5a50',lineHeight:1.6,fontStyle:'italic',fontFamily:'Cormorant Garamond,serif'}}>"I believe fashion should bring joy — and so should sharing it. Lagi is where my wardrobe breathes."</div></div></div><div style={{height:20}}/></div>
  </div>;
}
function RequestModal({item,onClose}){
  return <div className="modal-overlay" onClick={onClose}><div className="modal-sheet" onClick={e=>e.stopPropagation()}><div className="modal-handle"/><div className="modal-title">Request this piece</div><div className="modal-sub">Your request will go to {item.ownerName||'the owner'} first. They'll have 48 hours to respond.</div><div className="request-item-preview"><div className="ri-emoji">{item.emoji}</div><div><div style={{fontSize:15,fontWeight:500,color:'#2d2419'}}>{item.item||item.name}</div><div style={{fontSize:12,color:'#8a7060',marginTop:2}}>{item.brand} · {item.ownerName||'Friend'}</div><div style={{marginTop:6}}><StatusPill status={item.status}/></div></div></div><textarea className="message-input" rows={3} placeholder="Add a note... (optional)"/><button className="btn-primary" onClick={onClose}>Send Request ✦</button><button className="btn-ghost" onClick={onClose}>Cancel</button></div></div>;
}
function Clock(){
  const [time,setTime]=useState('');
  React.useEffect(()=>{
    const fmt=()=>{const n=new Date();let h=n.getHours(),m=n.getMinutes();const ampm=h>=12?'PM':'AM';h=h%12||12;return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;};
    setTime(fmt());
    const id=setInterval(()=>setTime(fmt()),10000);
    return()=>clearInterval(id);
  },[]);
  return <span>{time}</span>;
}
function App(){
  const [onboarded,setOnboarded]=useState(false);
  const [tab,setTab]=useState('home');
  const [selectedItem,setSelectedItem]=useState(null);
  const [requestItem,setRequestItem]=useState(null);
  const bar=<div className="status-bar"><Clock/><span>●●●</span></div>;
  if(!onboarded) return <div className="phone">{bar}<OnboardingScreen onDone={()=>setOnboarded(true)}/></div>;
  if(selectedItem) return <div className="phone">{bar}<ItemDetail item={selectedItem} onBack={()=>setSelectedItem(null)} openRequest={()=>setRequestItem(selectedItem)}/>{requestItem&&<RequestModal item={requestItem} onClose={()=>setRequestItem(null)}/>}</div>;
  return <div className="phone">{bar}{tab==='home'&&<HomeFeed setTab={setTab} setSelectedItem={setSelectedItem}/>}{tab==='wardrobe'&&<WardrobeScreen setSelectedItem={setSelectedItem}/>}{tab==='outfit'&&<OutfitBuilder/>}{tab==='friends'&&<FriendsScreen setSelectedItem={setSelectedItem}/>}{tab==='profile'&&<ProfileScreen/>}<NavBar active={tab} setActive={setTab}/></div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
