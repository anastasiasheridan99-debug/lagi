// ── AI clothing identifier ───────────────────────────────────────
async function identifyClothing(base64Image){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-opus-4-6',
        max_tokens:300,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64Image}},
          {type:'text',text:'You are a fashion expert. Look at this clothing item and respond with ONLY a JSON object (no markdown, no explanation) with these fields: name (short descriptive name e.g. "Floral Wrap Dress"), category (one of: Tops, Dresses, Bottoms, Jackets, Shoes, Bags, Accessories), color (main color), emoji (single most fitting emoji for this item). Keep it concise.'}
        ]}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  }catch(e){return null;}
}

// ── Add Item Modal ───────────────────────────────────────────────
function AddItem({userId,onClose,onAdded}){
  const [photo,setPhoto]=useState(null); // {file, preview, base64}
  const [aiScanning,setAiScanning]=useState(false);
  const [aiResult,setAiResult]=useState(null);
  const [form,setForm]=useState({name:'',brand:'',category:'Tops',size:'',color:'',season:'All',condition:'Excellent',status:'keep',note:'',emoji:'👗'});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const handlePhoto=async(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const preview=URL.createObjectURL(file);
    // Convert to base64
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      const base64=ev.target.result.split(',')[1];
      setPhoto({file,preview,base64});
      // Run AI identification
      setAiScanning(true);
      const result=await identifyClothing(base64);
      setAiScanning(false);
      if(result){
        setAiResult(result);
        if(result.name)f('name',result.name);
        if(result.category&&CATS.includes(result.category))f('category',result.category);
        if(result.color)f('color',result.color);
        if(result.emoji)f('emoji',result.emoji);
      }
    };
    reader.readAsDataURL(file);
  };

  const save=async()=>{
    if(!photo){setErr('Please upload a photo of the item');return;}
    if(!form.name){setErr('Please add a name for this item');return;}
    setLoading(true);setErr('');
    try{
      // Upload image to Supabase Storage
      const ext=photo.file.name.split('.').pop()||'jpg';
      const path=`${userId}/${Date.now()}.${ext}`;
      const{error:uploadErr}=await sb.storage.from('wardrobe-images').upload(path,photo.file,{contentType:photo.file.type||'image/jpeg'});
      if(uploadErr)throw new Error(uploadErr.message);
      // Get public URL
      const{data:urlData}=sb.storage.from('wardrobe-images').getPublicUrl(path);
      const imageUrl=urlData.publicUrl;
      // Save item to DB
      const{error:dbErr}=await sb.from('wardrobe_items').insert({user_id:userId,...form,image_url:imageUrl});
      if(dbErr)throw new Error(dbErr.message);
      onAdded();onClose();
    }catch(e){
      setErr(e.message||'Something went wrong. Please try again.');
      setLoading(false);
    }
  };

  return <div className="modal-overlay" onClick={onClose}>
    <div className="add-item-sheet" onClick={e=>e.stopPropagation()}>
      <div className="modal-handle"/>
      <div className="modal-title">Add item</div>
      <p style={{fontSize:13,color:'#8a7060',marginBottom:20}}>Upload a photo and we'll identify the piece for you</p>

      {/* Photo upload */}
      <div className="photo-upload-zone">
        {photo?<img src={photo.preview} alt="clothing"/>:<>
          <div className="photo-upload-icon">📷</div>
          <div className="photo-upload-text">Tap to upload a photo</div>
          <div className="photo-upload-sub">Required — we'll identify the item for you</div>
        </>}
        <input type="file" accept="image/*" className="photo-upload-input" onChange={handlePhoto}/>
      </div>

      {/* AI scanning state */}
      {aiScanning&&<div className="ai-scanning"><div className="ai-dot"/><div className="ai-text">✦ Identifying your item...</div></div>}
      {aiResult&&!aiScanning&&<div className="ai-result"><div className="ai-result-title">✦ AI identified</div><div className="ai-result-text">{aiResult.emoji} {aiResult.name} · {aiResult.category} · {aiResult.color}</div></div>}

      {/* Form fields */}
      {[['Item name *','name','text','e.g. Floral Wrap Dress'],['Brand','brand','text','e.g. Zimmermann'],['Size','size','text','e.g. XS, S, 27']].map(([l,k,t,p])=>(
        <div key={k} style={{marginBottom:12}}><div className="field-label">{l}</div><input className="inp" type={t} placeholder={p} value={form[k]} onChange={e=>f(k,e.target.value)}/></div>
      ))}

      <div style={{marginBottom:12}}><div className="field-label">Category</div>
        <select className="inp" value={form.category} onChange={e=>f('category',e.target.value)}>{CATS.map(o=><option key={o}>{o}</option>)}</select>
      </div>

      <div style={{marginBottom:12}}><div className="field-label">Colour</div>
        <input className="inp" placeholder="e.g. Sage green" value={form.color} onChange={e=>f('color',e.target.value)}/>
      </div>

      <div style={{marginBottom:12}}><div className="field-label">Season</div>
        <select className="inp" value={form.season} onChange={e=>f('season',e.target.value)}>{['All','Spring','Summer','Autumn','Winter'].map(o=><option key={o}>{o}</option>)}</select>
      </div>

      {/* Condition with descriptions */}
      <div style={{marginBottom:12}}>
        <div className="field-label">Condition</div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
          {CONDITIONS.map(c=>(
            <div key={c.value} onClick={()=>f('condition',c.value)} style={{padding:'12px 14px',borderRadius:12,border:`1.5px solid ${form.condition===c.value?'#2d2419':'#d4c4b0'}`,background:form.condition===c.value?'#2d2419':'#faf7f3',cursor:'pointer',transition:'all .15s'}}>
              <div style={{fontSize:13,fontWeight:500,color:form.condition===c.value?'#f5ede3':'#2d2419'}}>{c.label}</div>
              <div style={{fontSize:11,color:form.condition===c.value?'#d4b896':'#b8a898',marginTop:2}}>{c.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Status */}
      <div style={{marginBottom:12}}>
        <div className="field-label">Availability</div>
        <select className="inp" value={form.status} onChange={e=>f('status',e.target.value)}>
          <option value="keep">Keep (not available)</option>
          <option value="lend">Lend</option>
          <option value="swap">Swap</option>
          <option value="give">Give Away</option>
        </select>
      </div>

      <div style={{marginBottom:20}}><div className="field-label">Notes (optional)</div>
        <textarea className="inp" rows={3} placeholder="e.g. Best for petites, looked great for dinner dates" value={form.note} onChange={e=>f('note',e.target.value)} style={{resize:'none'}}/>
      </div>

      {err&&<div className="error-msg" style={{marginBottom:12}}>{err}</div>}
      <button className="btn-primary" onClick={save} disabled={loading}>
        {loading?<span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><span style={{width:16,height:16,border:'2px solid rgba(255,255,255,.3)',borderTop:'2px solid #fff',borderRadius:'50%',display:'inline-block',animation:'spin .8s linear infinite'}}/> Saving...</span>:'Add to Wardrobe ✦'}
      </button>
      <button className="btn-ghost" onClick={onClose}>Cancel</button>
    </div>
  </div>;
}

    {keeps.length>0&&<><div className="section-title">Style from your Closet</div><div className="cards-scroll">{keeps.slice(0,6).map(item=><div className="item-card-sm" key={item.id} onClick={()=>setItem(item)}>{item.image_url?<img className="item-card-img" src={item.image_url} alt={item.name}/>:<div className="item-card-placeholder" style={{background:'#f0e6d8'}}>{item.emoji||'👗'}</div>}<div className="item-card-info"><div className="item-card-tag">{item.brand||item.category}</div><div className="item-card-title">{item.name}</div></div></div>)}</div></>}
    {avail.length>0&&<><div className="section-title">Available to Share</div><div className="cards-scroll">{avail.slice(0,6).map(item=><div className="item-card-sm" key={item.id} onClick={()=>setItem(item)}>{item.image_url?<img className="item-card-img" src={item.image_url} alt={item.name}/>:<div className="item-card-placeholder" style={{background:'#f0e6d8'}}>{item.emoji||'👗'}</div>}<div className="item-card-info"><div className="item-card-tag">{item.brand||item.category}</div><div className="item-card-title">{item.name}</div><div style={{marginTop:4}}><Pill status={item.status}/></div></div></div>)}</div></>}
    {wardrobe.length===0&&<div className="empty-state"><div className="empty-icon">👗</div><div className="empty-title">Your wardrobe is empty</div><div className="empty-sub">Start adding pieces to your closet and build your digital wardrobe.</div><button onClick={()=>go('wardrobe')} style={{marginTop:20,padding:'12px 24px',background:'#2d2419',color:'#f5ede3',border:'none',borderRadius:14,fontFamily:'DM Sans,sans-serif',fontSize:14,fontWeight:500,cursor:'pointer'}}>Add First Item</button></div>}
    <div style={{height:20}}/>
  </div>;
}

function Wardrobe({setItem,wardrobe,userId,onRefresh}){
  const [cat,setCat]=useState('All');
  const [st,setSt]=useState('All');
  const [showAdd,setShowAdd]=useState(false);
  const filtered=wardrobe.filter(w=>{
    if(cat!=='All'&&w.category!==cat)return false;
    if(st!=='All'&&(statusMap[w.status]?.label||'').toLowerCase()!==st.toLowerCase())return false;
    return true;
  });
  return <div className="screen">
    <div className="wardrobe-header"><div className="wh-top"><div><div className="page-title">My Wardrobe</div><div style={{fontSize:13,color:'#b8a898',marginTop:2}}>{wardrobe.length} pieces · {wardrobe.filter(w=>w.status!=='keep').length} available</div></div><button className="add-btn" onClick={()=>setShowAdd(true)}>+</button></div></div>
    <div className="filter-row">{['All',...CATS].map(c=><div key={c} className={`filter-chip ${cat===c?'filter-active':'filter-inactive'}`} onClick={()=>setCat(c)}>{c}</div>)}</div>
    <div className="filter-row" style={{paddingTop:0}}>{['All','Keep','Lend','Swap','Give Away'].map(s=><div key={s} className={`filter-chip ${st===s?'filter-active':'filter-inactive'}`} onClick={()=>setSt(s)}>{s}</div>)}</div>
    {filtered.length===0
      ?<div className="empty-state"><div className="empty-icon">👗</div><div className="empty-title">Nothing here yet</div><div className="empty-sub">Tap + to add your first piece</div><button onClick={()=>setShowAdd(true)} style={{marginTop:20,padding:'12px 24px',background:'#2d2419',color:'#f5ede3',border:'none',borderRadius:14,fontFamily:'DM Sans,sans-serif',fontSize:14,fontWeight:500,cursor:'pointer'}}>Add Item</button></div>
      :<div className="wardrobe-grid">{filtered.map(item=><div className="wcard" key={item.id} onClick={()=>setItem(item)}><div className="wcard-imgwrap">{item.image_url?<img className="wcard-img" src={item.image_url} alt={item.name}/>:<div className="wcard-img-placeholder" style={{background:'#f0e6d8'}}>{item.emoji||'👗'}</div>}<div className="wcard-badge"><Pill status={item.status}/></div></div><div className="wcard-info"><div className="wcard-brand">{item.brand||''}</div><div className="wcard-name">{item.name}</div></div></div>)}</div>}
    {showAdd&&<AddItem userId={userId} onClose={()=>setShowAdd(false)} onAdded={onRefresh}/>}
  </div>;
}

function Detail({item,onBack,openReq,userId,onRefresh}){
  const [avail,setAvail]=useState(item.status!=='keep');
  const [st,setSt]=useState(item.status);
  const [saving,setSaving]=useState(false);
  const isOwn=item.user_id===userId||!item.user_id;
  const save=async(s)=>{
    if(!item.id)return;
    setSaving(true);
    await sb.from('wardrobe_items').update({status:s}).eq('id',item.id);
    setSaving(false);
    if(onRefresh)onRefresh();
  };
  const condLabel=CONDITIONS.find(c=>c.value===item.condition);
  return <div className="screen">
    <div style={{position:'relative'}}>
      {item.image_url?<img className="detail-img" src={item.image_url} alt={item.name}/>:<div className="detail-img-placeholder"><span>{item.emoji||'👗'}</span></div>}
      <button className="back-btn" onClick={onBack}>←</button>
    </div>
    <div className="detail-body">
      <div className="detail-brand">{item.brand||''}</div>
      <div className="detail-title">{item.name}</div>
      <div className="detail-meta">
        {[['Category',item.category],['Size',item.size],['Colour',item.color],['Season',item.season]].map(([l,v])=>v?<div className="meta-item" key={l}><div className="meta-label">{l}</div><div className="meta-value">{v}</div></div>:null)}
      </div>
      {item.condition&&<div style={{background:'#faf7f3',borderRadius:12,padding:'10px 14px',marginBottom:16,border:'1px solid #ede5d8'}}><div style={{fontSize:11,color:'#b8a898',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:2}}>Condition</div><div style={{fontSize:14,fontWeight:500,color:'#2d2419'}}>{item.condition}</div>{condLabel&&<div style={{fontSize:12,color:'#8a7060',marginTop:2}}>{condLabel.desc}</div>}</div>}
      {item.note&&<div className="detail-note">"{item.note}"</div>}
      {isOwn&&<div className="toggle-row"><div><div style={{fontSize:14,fontWeight:500,color:'#2d2419'}}>Available to share</div><div style={{fontSize:12,color:'#b8a898',marginTop:2}}>Friends can request this piece</div></div><button className={`toggle-switch ${avail?'toggle-on':'toggle-off'}`} onClick={()=>{const n=!avail;setAvail(n);if(!n){setSt('keep');save('keep');}else{setSt('lend');save('lend');}}}><div className="toggle-knob" style={{left:avail?'23px':'3px'}}/></button></div>}
      {isOwn&&avail&&<div style={{marginBottom:16}}><div style={{fontSize:12,color:'#8a7060',marginBottom:8,fontWeight:500}}>How to share</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['lend','swap','give'].map(s=><div key={s} className={`filter-chip ${st===s?'filter-active':'filter-inactive'}`} onClick={()=>{setSt(s);save(s);}} style={{fontSize:12,padding:'6px 12px'}}>{statusMap[s].label}{saving?' ...':''}</div>)}</div></div>}
      {item.fromFriend&&<button className="btn-primary" onClick={openReq} style={{marginBottom:12}}>Request this piece</button>}
      {isOwn&&<div className="action-row"><button className="btn-outline">Edit</button><button className="btn-outline">Style it</button><button className="btn-filled">Share</button></div>}
    </div>
  </div>;
}

function OutfitBuilder({wardrobe}){
  const [slots,setSlots]=useState({top:null,bottom:null,outer:null,shoes:null});
  const [occ,setOcc]=useState('');
  const [active,setActive]=useState('top');
  const keys=['top','bottom','outer','shoes'];
  const ICONS={top:'👚',bottom:'👖',outer:'🧥',shoes:'👟'};
  const assign=p=>{setSlots(s=>({...s,[active]:p}));const nx=keys[keys.indexOf(active)+1];if(nx)setActive(nx);};
  return <div className="screen">
    <div className="outfit-header"><div className="page-title">Outfit Builder</div><div style={{fontSize:13,color:'#b8a898',marginTop:2}}>Build looks from your closet</div></div>
    <div className="outfit-canvas">
      <div style={{display:'flex',gap:10}}>{['top','outer'].map(s=><div key={s} className={`outfit-slot ${slots[s]?'':'outfit-slot-empty'}`} style={{background:slots[s]&&!slots[s].image_url?'#f0e6d8':'',border:active===s?'2px solid #c17b4e':'',borderRadius:14}} onClick={()=>setActive(s)}>{slots[s]?slots[s].image_url?<img className="outfit-slot-img" src={slots[s].image_url} alt=""/>:<span className="slot-emoji">{slots[s].emoji||ICONS[s]}</span>:<span className="slot-emoji">{ICONS[s]}</span>}<span className="outfit-slot-label">{slots[s]?slots[s].name.split(' ')[0]:s}</span></div>)}</div>
      <div style={{display:'flex',gap:10}}>{['bottom','shoes'].map(s=><div key={s} className={`outfit-slot ${slots[s]?'':'outfit-slot-empty'}`} style={{background:slots[s]&&!slots[s].image_url?'#f0e6d8':'',border:active===s?'2px solid #c17b4e':'',borderRadius:14}} onClick={()=>setActive(s)}>{slots[s]?slots[s].image_url?<img className="outfit-slot-img" src={slots[s].image_url} alt=""/>:<span className="slot-emoji">{slots[s].emoji||ICONS[s]}</span>:<span className="slot-emoji">{ICONS[s]}</span>}<span className="outfit-slot-label">{slots[s]?slots[s].name.split(' ')[0]:s}</span></div>)}</div>
      {Object.values(slots).every(Boolean)&&<div style={{textAlign:'center',padding:'8px 0',fontSize:13,color:'#c17b4e',fontWeight:500}}>✦ Outfit complete!</div>}
    </div>
    <div className="outfit-controls">
      <div className="outfit-section-title">Select {active} piece</div>
      {wardrobe.length===0?<div style={{fontSize:13,color:'#b8a898',padding:'8px 0'}}>Add items to your wardrobe first</div>
      :<div className="outfit-wardrobe-scroll">{wardrobe.slice(0,10).map(p=><div key={p.id} className="outfit-piece" style={{border:slots[active]?.id===p.id?'2px solid #c17b4e':'2px solid transparent'}} onClick={()=>assign(p)}>{p.image_url?<img src={p.image_url} alt=""/>:<span>{p.emoji||'👗'}</span>}</div>)}</div>}
      <div style={{marginTop:20}}><div className="outfit-section-title">Save for occasion</div><div className="occasion-chips">{['Date Night','Work','Weekend','Travel','Event'].map(o=><div key={o} className={`chip ${occ===o?'chip-active':'chip-inactive'}`} style={{fontSize:12,padding:'6px 14px'}} onClick={()=>setOcc(o)}>{o}</div>)}</div></div>
    </div>
    <div className="outfit-save-area"><button className="btn-primary" onClick={()=>{setSlots({top:null,bottom:null,outer:null,shoes:null});setOcc('');}}>{Object.values(slots).some(Boolean)?'Save Outfit ✦':'Clear & Start Over'}</button></div>
  </div>;
}

function Community({setItem,userId}){
  const [view,setView]=useState('friends');
  return <div className="screen">
    <div className="friends-header"><div className="page-title">Community</div><div style={{display:'flex',gap:8,marginTop:12}}>{['friends','browse'].map(v=><div key={v} className={`filter-chip ${view===v?'filter-active':'filter-inactive'}`} style={{fontSize:13}} onClick={()=>setView(v)}>{v==='friends'?'Friends':'Browse'}</div>)}</div></div>
    {view==='friends'
      ?<div className="empty-state"><div className="empty-icon">🤝</div><div className="empty-title">No friends yet</div><div className="empty-sub">Invite friends to Lagi so you can share pieces with each other. Friends get first access to your available items.</div><button style={{marginTop:20,padding:'12px 24px',background:'#2d2419',color:'#f5ede3',border:'none',borderRadius:14,fontFamily:'DM Sans,sans-serif',fontSize:14,fontWeight:500,cursor:'pointer'}}>Invite a Friend</button></div>
      :<div className="empty-state"><div className="empty-icon">✨</div><div className="empty-title">Nothing available yet</div><div className="empty-sub">When your friends mark items as available to lend, swap or give away, they'll show up here.</div></div>}
  </div>;
}

function Profile({profile,wardrobe,onSignOut}){
  const name=profile?.full_name||'My Profile';
  const username=profile?.username?`@${profile.username}`:'';
  const size=profile?.size;
  const aesthetics=profile?.aesthetics||[];
  const avail=wardrobe.filter(w=>w.status!=='keep').length;
  const badges=[];
  if(wardrobe.length>=1)badges.push({icon:'🌱',name:'First Piece',desc:'Added your first wardrobe item'});
  if(wardrobe.length>=5)badges.push({icon:'👗',name:'Wardrobe Starter',desc:'Added 5+ pieces'});
  if(avail>=1)badges.push({icon:'💛',name:'Generous Heart',desc:'Shared at least one piece'});
  return <div className="screen">
    <div className="profile-header"><div className="profile-top"><div className="profile-avatar">{name[0]?.toUpperCase()||'?'}</div><div><div className="profile-name">{name}</div><div className="profile-handle">{username} · Singapore</div><div className="profile-bio">{size?`Size ${size} · `:''}Lagi community member</div></div></div><div className="profile-stats"><div className="pstat"><div className="pstat-num">{wardrobe.length}</div><div className="pstat-label">Pieces</div></div><div className="pstat"><div className="pstat-num">{avail}</div><div className="pstat-label">Shared</div></div><div className="pstat"><div className="pstat-num">{badges.length}</div><div className="pstat-label">Badges</div></div></div></div>
    <div className="profile-body">
      {aesthetics.length>0&&<div style={{marginBottom:20}}><div className="section-title" style={{padding:0,marginBottom:12}}>My Aesthetics</div><div className="aesthetics-row">{aesthetics.map(a=><div key={a} className="aesthetic-tag">{a}</div>)}</div></div>}
      {badges.length>0&&<div style={{marginBottom:20}}><div className="section-title" style={{padding:0,marginBottom:12}}>Achievements</div><div className="badges-grid">{badges.map(b=><div className="badge-item" key={b.name}><div className="badge-icon">{b.icon}</div><div><div className="badge-name">{b.name}</div><div className="badge-desc">{b.desc}</div></div></div>)}</div></div>}
      <div style={{marginBottom:20}}><div className="section-title" style={{padding:0,marginBottom:12}}>Style Mood</div><div style={{background:'#faf7f3',borderRadius:16,padding:16,border:'1px solid #ede5d8'}}><div style={{fontSize:16,color:'#6a5a50',lineHeight:1.6,fontStyle:'italic',fontFamily:'Cormorant Garamond,serif'}}>"I believe fashion should bring joy — and so should sharing it. Lagi is where my wardrobe breathes."</div></div></div>
      <button onClick={onSignOut} style={{width:'100%',padding:14,background:'transparent',color:'#c0392b',border:'1.5px solid #f5c6c6',borderRadius:12,fontFamily:'DM Sans,sans-serif',fontSize:14,cursor:'pointer',marginBottom:20}}>Sign out</button>
    </div>
  </div>;
}

function ReqModal({item,onClose,userId}){
  const [msg,setMsg]=useState('');
  const [loading,setLoading]=useState(false);
  const [sent,setSent]=useState(false);
  const send=async()=>{
    setLoading(true);
    if(item.id){await sb.from('item_requests').insert({item_id:item.id,requester_id:userId,owner_id:item.user_id,message:msg,status:'requested'});}
    setLoading(false);setSent(true);setTimeout(onClose,1500);
  };
  return <div className="modal-overlay" onClick={onClose}><div className="modal-sheet" onClick={e=>e.stopPropagation()}><div className="modal-handle"/><div className="modal-title">Request this piece</div><div className="modal-sub">Your request will go to the owner first. They'll have 48 hours to respond.</div><div className="request-item-preview">{item.image_url?<img className="ri-img" src={item.image_url} alt=""/>:<div className="ri-placeholder">{item.emoji||'👗'}</div>}<div><div style={{fontSize:15,fontWeight:500,color:'#2d2419'}}>{item.name}</div><div style={{fontSize:12,color:'#8a7060',marginTop:2}}>{item.brand}</div><div style={{marginTop:6}}><Pill status={item.status}/></div></div></div>{sent?<div className="success-msg" style={{marginBottom:16}}>✓ Request sent!</div>:<><textarea className="message-input" rows={3} placeholder="Add a note... (optional)" value={msg} onChange={e=>setMsg(e.target.value)}/><button className="btn-primary" onClick={send} disabled={loading}>{loading?'Sending...':'Send Request ✦'}</button></>}<button className="btn-ghost" onClick={onClose}>Cancel</button></div></div>;
}

// ── Root ─────────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState('loading');
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [wardrobe,setWardrobe]=useState([]);
  const [tab,setTab]=useState('home');
  const [item,setItem]=useState(null);
  const [reqItem,setReqItem]=useState(null);

  const loadProfile=async u=>{const{data}=await sb.from('profiles').select('*').eq('id',u.id).single();return data;};
  const loadWardrobe=async u=>{const{data}=await sb.from('wardrobe_items').select('*').eq('user_id',u.id).order('created_at',{ascending:false});return data||[];};
  const refresh=async()=>{if(user){const w=await loadWardrobe(user);setWardrobe(w);}};

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session?.user){setUser(session.user);const p=await loadProfile(session.user);const w=await loadWardrobe(session.user);setProfile(p);setWardrobe(w);setState(p?'ready':'onboarding');}
      else setState('auth');
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==='SIGNED_IN'&&session?.user){setUser(session.user);const p=await loadProfile(session.user);const w=await loadWardrobe(session.user);setProfile(p);setWardrobe(w);setState(p?'ready':'onboarding');}
      else if(event==='SIGNED_OUT'){setUser(null);setProfile(null);setWardrobe([]);setState('auth');}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const signOut=async()=>await sb.auth.signOut();
  const bar=<div className="status-bar"><Clock/><span>●●●</span></div>;

  if(state==='loading') return <div className="phone">{bar}<div className="loading-screen"><div className="spinner"/><div style={{fontSize:13,color:'#b8a898'}}>Loading Lagi...</div></div></div>;
  if(state==='auth') return <div className="phone">{bar}<AuthScreen onAuth={async u=>{setUser(u);const p=await loadProfile(u);setProfile(p);setState(p?'ready':'onboarding');}}/></div>;
  if(state==='onboarding') return <div className="phone">{bar}<Onboarding user={user} onDone={async()=>{const p=await loadProfile(user);const w=await loadWardrobe(user);setProfile(p);setWardrobe(w);setState('ready');}}/></div>;
  if(item) return <div className="phone">{bar}<Detail item={item} onBack={()=>setItem(null)} openReq={()=>setReqItem(item)} userId={user?.id} onRefresh={refresh}/>{reqItem&&<ReqModal item={reqItem} onClose={()=>setReqItem(null)} userId={user?.id}/>}</div>;

  return <div className="phone">
    {bar}
    {tab==='home'&&<HomeFeed go={setTab} setItem={setItem} wardrobe={wardrobe} profile={profile}/>}
    {tab==='wardrobe'&&<Wardrobe setItem={setItem} wardrobe={wardrobe} userId={user?.id} onRefresh={refresh}/>}
    {tab==='outfit'&&<OutfitBuilder wardrobe={wardrobe}/>}
    {tab==='friends'&&<Community setItem={setItem} userId={user?.id}/>}
    {tab==='profile'&&<Profile profile={profile} wardrobe={wardrobe} onSignOut={signOut}/>}
    <Nav active={tab} go={setTab}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
